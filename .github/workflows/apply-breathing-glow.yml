name: Apply breathing building glow

on:
  push:
    paths:
      - .github/workflows/apply-breathing-glow.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch single page app
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lofi-music-animation-generator/index.html')
          text = path.read_text(encoding='utf-8')

          old_props = '''            roof: choose(["flat", "antenna", "tank", "step"]),
            depth: rand(4, 14),
            windows: [],'''
          new_props = '''            roof: choose(["flat", "antenna", "tank", "step"]),
            depth: rand(4, 14),
            breathPhase: rand(0, TAU),
            breathSpeed: rand(0.18, 0.62),
            breathStrength: rand(0.08, 0.22),
            windows: [],'''
          text = text.replace(old_props, new_props)

          old_loop = '''        for (const b of buildings) {
          ctx.save();'''
          new_loop = '''        for (const b of buildings) {
          const breath = 0.5 + 0.5 * Math.sin(t * b.breathSpeed + b.breathPhase);
          const buildingGlow = 0.04 + breath * b.breathStrength;

          ctx.save();'''
          text = text.replace(old_loop, new_loop)

          old_overlay_anchor = '''          ctx.fillStyle = p.buildingSide;
          ctx.fillRect(b.x + b.w - b.depth, b.y + b.depth, b.depth, b.h - b.depth);

          if (b.roof === "antenna") {'''
          new_overlay_anchor = '''          ctx.fillStyle = p.buildingSide;
          ctx.fillRect(b.x + b.w - b.depth, b.y + b.depth, b.depth, b.h - b.depth);

          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.globalAlpha = buildingGlow;
          const breathGradient = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
          breathGradient.addColorStop(0, "rgba(142, 248, 255, 0.22)");
          breathGradient.addColorStop(0.42, "rgba(255, 98, 207, 0.24)");
          breathGradient.addColorStop(1, "rgba(255, 215, 122, 0.14)");
          ctx.fillStyle = breathGradient;
          ctx.fillRect(b.x, b.y, b.w, b.h);
          ctx.strokeStyle = `rgba(142, 248, 255, ${0.04 + breath * 0.12})`;
          ctx.lineWidth = 1;
          ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
          ctx.restore();

          if (b.roof === "antenna") {'''
          text = text.replace(old_overlay_anchor, new_overlay_anchor)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-breathing-glow.yml').unlink()
          PY
      - name: Commit patched app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lofi-music-animation-generator/index.html .github/workflows/apply-breathing-glow.yml
          git diff --cached --quiet || git commit -m "Add breathing building glow"
          git push
