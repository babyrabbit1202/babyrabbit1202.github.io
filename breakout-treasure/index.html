<!doctype html><html lang='zh-TW'><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>寶物打磚塊</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111722;color:#edf4ff;font-family:Segoe UI,Noto Sans TC,system-ui,sans-serif}.app{width:min(1100px,calc(100vw - 24px));display:grid;grid-template-columns:1fr 250px;gap:14px}.game{border:1px solid #38445c;background:#202838;border-radius:8px;overflow:hidden;box-shadow:0 18px 60px #0008}.bar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#151b27;border-bottom:1px solid #38445c}.bar h1{font-size:20px;margin:0}.stats{display:flex;gap:8px}.stats span{min-width:70px;text-align:center;background:#2a3448;border:1px solid #3d4961;border-radius:6px;padding:5px 8px;color:#9fabbd;font-size:12px}.stats b{display:block;color:#fff;font-size:17px}canvas{display:block;width:100%;aspect-ratio:16/10;background:#101824;touch-action:none;cursor:none}.panel{border:1px solid #38445c;background:#202838;border-radius:8px;padding:14px;margin-bottom:12px}.panel h2{font-size:15px;margin:0 0 10px}button{height:38px;border:1px solid #45536c;border-radius:6px;background:#2f72df;color:white;font:inherit;font-weight:700;cursor:pointer}button+button{background:#2b3446}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hint,.list{font-size:13px;color:#a8b3c5;line-height:1.55}.list div{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #39445a;padding:6px 0}.list div:last-child{border:0}.tag{display:inline-grid;place-items:center;width:26px;height:22px;border-radius:5px;color:#10131a;font-weight:800;margin-right:8px}.status{min-height:42px;font-size:14px;line-height:1.45}@media(max-width:850px){body{padding:12px 0}.app{grid-template-columns:1fr}.bar{height:auto;min-height:54px;flex-wrap:wrap;padding:10px}.bar h1{width:100%}.stats{width:100%;flex-wrap:wrap}.stats span{flex:1}canvas{cursor:default}}</style><body><main class='app'><section class='game'><div class='bar'><h1>寶物打磚塊</h1><div class='stats'><span>分數<b id='score'>0</b></span><span>生命<b id='life'>3</b></span><span>關卡<b id='level'>1</b></span><span>磚塊<b id='left'>0</b></span></div></div><canvas id='c' width='960' height='600'></canvas></section><aside><section class='panel'><h2>控制</h2><div class='btns'><button id='start'>開始</button><button id='mute'>靜音</button></div><p class='hint'>滑鼠、觸控或左右鍵移動球拍。空白鍵發球；拿到機關槍後按住空白鍵或滑鼠射擊。</p></section><section class='panel'><h2>寶物</h2><div class='list' id='list'></div></section><section class='panel'><h2>狀態</h2><div class='status' id='status'>按開始進入遊戲。</div></section></aside></main><script>(()=>{const c=document.getElementById('c'),g=c.getContext('2d'),W=c.width,H=c.height,E={wide:['長','球拍加長','#72e06a',12],short:['短','球拍變短','#ff8a5c',9],fast:['快','球速變快','#ff6363',9],slow:['慢','球速變慢','#66c7ff',9],fire:['火','火球穿透','#ffc857',12],gun:['槍','球拍機關槍','#e8efff',12]},ids=['wide','short','fast','slow','fire','gun'],el=id=>document.getElementById(id);let score=0,life=3,level=1,run=0,wait=1,muted=0,px=420,pw=120,base=7,ball,br=[],po=[],bu=[],pa=[],eff={},keys={},down=0,fc=0,last=0,ac,master,music,mt=0,step=0;el('list').innerHTML=ids.map(k=>`<div><span><span class=tag style=background:${E[k][2]}>${E[k][0]}</span>${E[k][1]}</span><b id=t_${k}>--</b></div>`).join('');function audio(){if(ac)return;ac=new(AudioContext||webkitAudioContext);master=ac.createGain();music=ac.createGain();master.gain.value=.35;music.gain.value=.14;music.connect(master);master.connect(ac.destination)}function beep(f,d=.06,t='square',v=.2){if(!ac||muted)return;let n=ac.currentTime,o=ac.createOscillator(),a=ac.createGain();o.type=t;o.frequency.value=f;a.gain.setValueAtTime(.001,n);a.gain.exponentialRampToValueAtTime(v,n+.01);a.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(a);a.connect(master);o.start(n);o.stop(n+d+.02)}function song(dt){if(!ac||muted||!run)return;mt-=dt;if(mt>0)return;let ns=[196,247,294,330,294,247,220,247],n=ac.currentTime,o=ac.createOscillator(),a=ac.createGain();o.type='triangle';o.frequency.value=ns[step++%ns.length]*(level>2?1.1:1);a.gain.setValueAtTime(.001,n);a.gain.exponentialRampToValueAtTime(.07,n+.02);a.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(a);a.connect(music);o.start(n);o.stop(n+.3);mt=.28}function stat(){el('score').textContent=score;el('life').textContent=life;el('level').textContent=level;el('left').textContent=br.length;ids.forEach(k=>el('t_'+k).textContent=eff[k]?Math.ceil(eff[k])+'s':'--')}function mk(){br=[];let rows=Math.min(5+level,8),cols=12,gap=8,bw=(W-68-gap*(cols-1))/cols,cs=['#f25f5c','#ffe066','#48cae4','#7bd88f','#b28dff','#f7a072'];for(let r=0;r<rows;r++)for(let col=0;col<cols;col++)br.push({x:34+col*(bw+gap),y:70+r*32,w:bw,h:24,hp:level>2&&r<2?2:1,c:cs[(r+col+level)%cs.length],p:Math.random()<.3?ids[Math.random()*ids.length|0]:0});stat()}function norm(){let m=(eff.fast?1.32:1)*(eff.slow?.74:1),s=base*m,l=Math.hypot(ball.vx,ball.vy)||1;ball.vx=ball.vx/l*s;ball.vy=ball.vy/l*s}function reset(){wait=1;ball={x:px+pw/2,y:H-65,r:8,vx:(Math.random()<.5?-1:1)*4,vy:-5.5};norm()}function start(){audio();if(ac.state==='suspended')ac.resume();score=0;life=3;level=1;base=7;px=W/2-60;pw=120;po=[];bu=[];pa=[];eff={};run=1;mk();reset();el('start').textContent='重開';el('status').textContent='打破磚塊找出隱藏寶物。';beep(520,.12,'triangle')}function serve(){if(run&&wait){wait=0;beep(600)}}function power(k){if(k==='wide'){delete eff.short;pw=180}if(k==='short'){delete eff.wide;pw=82}if(k==='fast')delete eff.slow;if(k==='slow')delete eff.fast;eff[k]=E[k][3];norm();el('status').textContent=E[k][1];beep(k==='gun'?900:700,.12,'sawtooth')}function burst(x,y,c){for(let i=0;i<10;i++){let a=Math.random()*7,s=1+Math.random()*3;pa.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:.45,c})}}function hit(i,shot){let b=br[i];b.hp-=eff.fire&&!shot?b.hp:1;if(b.hp<=0){score+=shot?8:10;if(b.p)po.push({k:b.p,x:b.x+b.w/2,y:b.y+b.h/2,s:24});burst(b.x+b.w/2,b.y+b.h/2,b.c);br.splice(i,1);beep(shot?780:620);if(!br.length){level++;base+=.35;po=[];bu=[];eff={};pw=120;mk();reset();el('status').textContent='過關！下一關開始。';beep(1040,.16,'triangle')}}else{score+=3;beep(330,.04,'triangle')}stat()}function lose(){life--;stat();beep(140,.2,'sawtooth');if(life<1){run=0;el('status').textContent='遊戲結束。按重開再挑戰。'}else{el('status').textContent='掉球了，按空白鍵重新發球。';reset()}}function update(dt){if(!run)return;if(keys.ArrowLeft||keys.a)px-=9;if(keys.ArrowRight||keys.d)px+=9;px=Math.max(0,Math.min(W-pw,px));if(wait){ball.x=px+pw/2;ball.y=H-62}ids.forEach(k=>{if(eff[k]){eff[k]-=dt;if(eff[k]<=0){delete eff[k];if(k==='wide'||k==='short')pw=120;if(k==='fast'||k==='slow')norm()}}});fc-=dt;if(eff.gun&&(down||keys[' '])&&!wait&&fc<=0){bu.push({x:px+pw*.28,y:H-50},{x:px+pw*.72,y:H-50});fc=.16;beep(980,.03)}if(!wait){ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<ball.r||ball.x>W-ball.r){ball.vx*=-1;ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x));beep(250,.03)}if(ball.y<ball.r){ball.vy*=-1;ball.y=ball.r;beep(280,.03)}if(ball.y>H+20)lose();if(ball.y+ball.r>H-46&&ball.y-ball.r<H-31&&ball.x>px&&ball.x<px+pw&&ball.vy>0){let q=(ball.x-px-pw/2)/(pw/2);ball.vx=q*7;ball.vy=-Math.abs(ball.vy);norm();ball.y=H-55;beep(430,.04)}for(let i=br.length-1;i>=0;i--){let b=br[i];if(ball.x+ball.r<b.x||ball.x-ball.r>b.x+b.w||ball.y+ball.r<b.y||ball.y-ball.r>b.y+b.h)continue;hit(i,0);if(!eff.fire){let ox=Math.min(ball.x+ball.r-b.x,b.x+b.w-ball.x+ball.r),oy=Math.min(ball.y+ball.r-b.y,b.y+b.h-ball.y+ball.r);if(ox<oy)ball.vx*=-1;else ball.vy*=-1}break}}for(let i=po.length-1;i>=0;i--){let p=po[i];p.y+=3;if(p.y+p.s/2>H-46&&p.x>px&&p.x<px+pw){power(p.k);po.splice(i,1)}else if(p.y>H+30)po.splice(i,1)}for(let i=bu.length-1;i>=0;i--){let q=bu[i];q.y-=9;let used=0;for(let j=br.length-1;j>=0;j--){let b=br[j];if(q.x>b.x&&q.x<b.x+b.w&&q.y>b.y&&q.y<b.y+b.h){hit(j,1);used=1;break}}if(used||q.y<0)bu.splice(i,1)}for(let i=pa.length-1;i>=0;i--){let p=pa[i];p.t-=dt;p.x+=p.vx;p.y+=p.vy;p.vy+=.04;if(p.t<=0)pa.splice(i,1)}stat()}function rr(x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.fill()}function draw(){g.fillStyle='#101824';g.fillRect(0,0,W,H);g.strokeStyle='#ffffff10';for(let x=0;x<W;x+=48){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke()}for(let y=0;y<H;y+=48){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}br.forEach(b=>{g.fillStyle=b.c;rr(b.x,b.y,b.w,b.h,5);g.fillStyle='#ffffff40';g.fillRect(b.x+6,b.y+4,b.w-12,3);if(b.p){g.fillStyle='#0004';g.beginPath();g.arc(b.x+b.w-12,b.y+12,4,0,7);g.fill()}});po.forEach(p=>{g.save();g.translate(p.x,p.y);g.fillStyle=E[p.k][2];rr(-12,-12,24,24,6);g.strokeStyle='#fff';g.stroke();g.fillStyle='#10131a';g.font='bold 15px sans-serif';g.textAlign='center';g.textBaseline='middle';g.fillText(E[p.k][0],0,1);g.restore()});bu.forEach(q=>{g.fillStyle='#e8f1ff';rr(q.x-3,q.y-12,6,16,3);g.fillStyle='#45d6d0';g.fillRect(q.x-1,q.y-18,2,8)});pa.forEach(p=>{g.globalAlpha=Math.max(0,p.t/.45);g.fillStyle=p.c;g.fillRect(p.x,p.y,4,4);g.globalAlpha=1});g.fillStyle=eff.gun?'#e8efff':'#45d6d0';rr(px,H-46,pw,15,7);g.fillStyle='#ffffff55';g.fillRect(px+8,H-43,pw-16,3);if(eff.gun){g.fillStyle='#8794aa';g.fillRect(px+pw*.25,H-54,10,10);g.fillRect(px+pw*.7,H-54,10,10)}let grd=g.createRadialGradient(ball.x-3,ball.y-4,2,ball.x,ball.y,15);if(eff.fire){grd.addColorStop(0,'#fff3b0');grd.addColorStop(.5,'#ff8a00');grd.addColorStop(1,'#ef233c');g.shadowColor='#ff6b00';g.shadowBlur=20}else{grd.addColorStop(0,'#fff');grd.addColorStop(.6,'#c8f7ff');grd.addColorStop(1,'#45d6d0')}g.fillStyle=grd;g.beginPath();g.arc(ball.x,ball.y,ball.r,0,7);g.fill();g.shadowBlur=0;if(!run||wait){g.fillStyle='#0008';g.fillRect(0,0,W,H);g.textAlign='center';g.fillStyle='#fff';g.font='bold 42px sans-serif';g.fillText(run?'準備發球':'寶物打磚塊',W/2,H/2-12);g.fillStyle='#f7c948';g.font='22px sans-serif';g.fillText(run?'按空白鍵或點一下畫面':'按開始遊戲',W/2,H/2+32)}}function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);song(dt);draw();requestAnimationFrame(loop)}el('start').onclick=start;el('mute').onclick=()=>{audio();muted=!muted;master.gain.value=muted?0:.35;el('mute').textContent=muted?'開聲音':'靜音'};c.onpointermove=e=>{let r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W;px=Math.max(0,Math.min(W-pw,x-pw/2))};c.onpointerdown=e=>{down=1;if(!run)start();else serve();c.setPointerCapture&&c.setPointerCapture(e.pointerId)};c.onpointerup=()=>down=0;c.onpointercancel=()=>down=0;onkeydown=e=>{keys[e.key]=1;keys[e.key.toLowerCase()]=1;if([' ','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();if(e.key===' ')serve()};onkeyup=e=>{keys[e.key]=0;keys[e.key.toLowerCase()]=0};mk();reset();requestAnimationFrame(loop)})();</script>
