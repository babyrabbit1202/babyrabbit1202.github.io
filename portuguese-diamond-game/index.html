<!doctype html><html lang='zh-Hant'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>葡語鑽石島</title><style>:root{--g:#31b95e;--l:#7ed957;--b:#7bdff2;--y:#ffd166;--p:#8f5cff;--r:#ff7b6e;--i:#21313c;--m:#647887;--line:#dce8ef}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Trebuchet MS','Microsoft JhengHei',system-ui,sans-serif;color:var(--i);background:radial-gradient(circle at 15% 10%,#ffe8a8 0 18rem,transparent 19rem),radial-gradient(circle at 85% 4%,#caf7ff 0 22rem,transparent 23rem),linear-gradient(#f8feff,#eefbea);overflow-x:hidden}button{font:inherit;border:0;cursor:pointer}button:focus-visible{outline:4px solid #8f5cff55;outline-offset:3px}.wrap{width:min(1160px,calc(100% - 24px));margin:auto;padding:18px 0 32px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.face{width:58px;height:58px;border-radius:50%;background:var(--g);display:grid;place-items:center;box-shadow:0 10px 20px #31b95e33;font-size:32px}.brand h1{font-size:clamp(1.6rem,4vw,2.4rem);line-height:1;margin:0}.brand p{margin:.35rem 0 0;color:var(--m);font-weight:800}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#fff;border:2px solid var(--line);border-radius:999px;padding:9px 13px;font-weight:1000;box-shadow:0 8px 18px #31506014}.grid{display:grid;grid-template-columns:300px 1fr;gap:18px}.panel{background:#ffffffee;border:2px solid var(--line);border-radius:8px;box-shadow:0 16px 36px #294b6018;min-width:0}.side{padding:16px}.side-title{display:flex;justify-content:space-between;font-weight:1000;margin-bottom:12px}.lessons{display:grid;gap:10px}.lesson{width:100%;display:grid;grid-template-columns:46px 1fr auto;align-items:center;gap:10px;text-align:left;background:#fff;border:2px solid var(--line);border-radius:8px;padding:10px;color:var(--i)}.lesson.active{border-color:var(--g);background:#f0fff4}.ico{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:#eafaff;font-size:25px}.lesson b,.lesson small{display:block}.lesson small{color:var(--m);font-weight:800;overflow-wrap:anywhere}.ring{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--y) var(--v),#edf3f6 0);font-size:12px;font-weight:1000}.daily{margin-top:14px;padding:13px;border:2px dashed #ffc857;border-radius:8px;background:#fff8dc}.daily b{display:block;margin-bottom:4px}.daily p{margin:0 0 10px;color:#755a23;font-weight:850;line-height:1.45}.game{padding:clamp(16px,3vw,30px);min-height:680px;position:relative;overflow:hidden}.game:after{content:'';position:absolute;right:-70px;bottom:-90px;width:250px;aspect-ratio:1;border-radius:50%;background:#7bdff233}.head{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;position:relative}.mode{color:var(--p);font-weight:1000;margin-bottom:10px}.mode span{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--p);color:white;margin-right:7px}.q{font-size:clamp(1.8rem,5vw,3.15rem);line-height:1.08;margin:0;overflow-wrap:anywhere}.q small{display:block;font-size:1rem;color:var(--m);font-weight:850;margin-top:10px}.sound{width:58px;height:58px;border-radius:50%;background:#fff3c6;border:2px solid #ffe28a;box-shadow:0 8px 0 #e4bd48;font-size:25px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:56px;position:relative}.card{min-height:245px;background:white;border:3px solid var(--line);border-radius:8px;padding:16px;display:grid;grid-template-rows:1fr auto;text-align:left;box-shadow:0 7px 0 #d7e4eb;color:var(--i);transition:.16s}.card:hover{transform:translateY(-3px);border-color:var(--b)}.art{font-size:82px;display:grid;place-items:center}.ct{display:flex;justify-content:space-between;align-items:end;gap:8px;font-size:1.15rem;font-weight:1000}.key{width:32px;height:32px;border-radius:8px;border:2px solid #e2e8ec;display:grid;place-items:center;color:#9aa8b1}.ok{border-color:var(--g)!important;background:#effff4!important;box-shadow:0 7px 0 #8ee6aa!important}.bad{border-color:var(--r)!important;background:#fff0ef!important;box-shadow:0 7px 0 #ffb4ad!important}.sentence{display:none;margin-top:34px;gap:18px;position:relative}.answer{min-height:116px;border:3px dashed #cfe0e8;border-radius:8px;background:#f9fdff;padding:15px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}.bank{display:flex;flex-wrap:wrap;gap:10px}.chip{background:white;border:2px solid #cfe0e8;border-radius:8px;padding:11px 15px;font-weight:1000;box-shadow:0 5px 0 #d7e4eb}.chip.sel{background:#eaf9ef;border-color:var(--g);box-shadow:0 5px 0 #9ee7b2}.fb{visibility:hidden;margin-top:22px;border-radius:8px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:2px solid transparent}.fb.show{visibility:visible}.fb.good{background:#ecfff2;border-color:#9ce9b2}.fb.oops{background:#fff2ef;border-color:#ffc0b8}.fb b{font-size:1.1rem}.fb p{margin:.2rem 0 0;color:var(--m);font-weight:850}.row{display:flex;gap:12px;align-items:center;margin-top:18px;position:relative}.bar{flex:1;height:15px;background:#e8f1f5;border:2px solid #dce9ef;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;width:var(--w);background:linear-gradient(90deg,var(--l),var(--y));border-radius:999px}.btn{min-height:44px;border-radius:8px;padding:10px 14px;font-weight:1000;background:var(--g);color:white;box-shadow:0 8px 0 #168c42}.btn:active{transform:translateY(5px);box-shadow:0 3px 0 #168c42}.ghost{min-height:44px;border-radius:8px;padding:10px 14px;font-weight:1000;background:#eef8fc;color:#28677a;border:2px solid #d7edf4}.done{display:none;text-align:center;padding:30px 10px}.done .big{font-size:120px}.done h2{font-size:clamp(2rem,5vw,3.4rem);margin:0}.done p{max-width:580px;margin:8px auto 18px;color:var(--m);font-weight:850}.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,140%);background:#21313c;color:white;border-radius:999px;padding:10px 15px;font-weight:1000;box-shadow:0 12px 28px #0004;transition:.25s}.toast.show{transform:translate(-50%,0)}@media(max-width:900px){.grid{grid-template-columns:1fr}.choices{grid-template-columns:1fr;margin-top:32px}.card{min-height:150px;grid-template-columns:120px 1fr;grid-template-rows:1fr;align-items:center}.art{font-size:62px}.side{position:static}.lessons{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.top,.head,.fb{grid-template-columns:1fr}.stats{justify-content:flex-start}.lessons{grid-template-columns:1fr}.q{font-size:1.85rem}.game{min-height:0}.row{display:grid}.btn,.ghost{width:100%}}</style></head><body><div class='wrap'><header class='top'><div class='brand'><div class='face'>🙂</div><div><h1>葡語鑽石島</h1><p>巴西葡萄牙語每日複習遊戲</p></div></div><div class='stats'><span class='pill'>💎 <b id='dia'>0</b></span><span class='pill'>⚡ <b id='xp'>0</b> XP</span><span class='pill'>🔥 <b id='st'>1</b> 天</span></div></header><main class='grid'><aside class='panel side'><div class='side-title'><span>練習島路線</span><span id='date'></span></div><div class='lessons' id='lessons'></div><div class='daily'><b>今日任務</b><p>完成 8 題複習，錯題會自動排回本輪再練一次。</p><button class='btn' id='start'>▶ 開始複習</button></div></aside><section class='panel game'><div id='play'><div class='head'><div><div class='mode'><span id='dot'>★</span><em id='mode'>新單字</em></div><h2 class='q' id='q'>哪個是「茶」呢？<small id='sub'>點卡片會播放葡語發音，再選答案。</small></h2></div><button class='sound' id='speak'>🔊</button></div><div class='choices' id='choices'></div><div class='sentence' id='sent'><div class='answer' id='answer'></div><div class='bank' id='bank'></div></div><div class='fb' id='fb'><div><b id='ft'>答對了</b><p id='fp'>+10 XP，+2 鑽石</p></div><button class='btn' id='next'>下一題</button></div><div class='row'><div class='bar'><i id='prog'></i></div><button class='ghost' id='again'>🔊 再聽一次</button><button class='ghost' id='reset'>↺ 重置紀錄</button></div></div><div class='done' id='done'><div class='big'>🏆</div><h2>今日複習完成</h2><p id='donep'>這一輪的單字和句型已經練過。</p><button class='btn' id='more'>繼續練習</button></div></section></main></div><div class='toast' id='toast'>已播放發音</div><script>const L=[{id:'food',ico:'🍔',title:'食物飲料',goal:'sanduíche, chá, café',cards:[{t:'c',m:'新單字',zh:'茶',a:'chá',d:['café','leite'],e:'Eu quero chá.',art:'🍵'},{t:'c',m:'新單字',zh:'咖啡',a:'café',d:['suco','chá'],e:'O café está quente.',art:'☕'},{t:'c',m:'新單字',zh:'三明治',a:'sanduíche',d:['pão','queijo'],e:'Eu como um sanduíche.',art:'🥪'},{t:'s',m:'句型',zh:'我想要一杯茶。',a:'Eu quero um chá',w:['quero','Eu','chá','um'],e:'Eu quero um chá.'}]},{id:'school',ico:'🎒',title:'校園生活',goal:'livro, prova, tarefa',cards:[{t:'c',m:'新單字',zh:'書',a:'livro',d:['lápis','prova'],e:'O livro é azul.',art:'📘'},{t:'c',m:'新單字',zh:'作業',a:'tarefa',d:['aula','caneta'],e:'A tarefa é fácil.',art:'📝'},{t:'c',m:'聽力',zh:'考試',a:'prova',d:['tarefa','livro'],e:'Tenho uma prova hoje.',art:'📄'},{t:'s',m:'句型',zh:'我今天有考試。',a:'Eu tenho prova hoje',w:['hoje','prova','tenho','Eu'],e:'Eu tenho prova hoje.'}]},{id:'daily',ico:'🏠',title:'日常句型',goal:'acordar, estudar, dormir',cards:[{t:'c',m:'新單字',zh:'學習',a:'estudar',d:['dormir','comer'],e:'Eu gosto de estudar.',art:'📚'},{t:'c',m:'新單字',zh:'睡覺',a:'dormir',d:['acordar','estudar'],e:'Vou dormir cedo.',art:'🌙'},{t:'c',m:'聽力',zh:'起床',a:'acordar',d:['chegar','morar'],e:'Eu acordo às seis.',art:'⏰'},{t:'s',m:'句型',zh:'我每天學葡語。',a:'Eu estudo português todos os dias',w:['português','Eu','todos','estudo','os','dias'],e:'Eu estudo português todos os dias.'}]},{id:'travel',ico:'🚌',title:'交通移動',goal:'ônibus, metrô, estação',cards:[{t:'c',m:'新單字',zh:'公車',a:'ônibus',d:['metrô','avião'],e:'O ônibus chegou.',art:'🚌'},{t:'c',m:'新單字',zh:'捷運',a:'metrô',d:['rua','ônibus'],e:'Vou de metrô.',art:'🚇'},{t:'c',m:'聽力',zh:'車站',a:'estação',d:['cidade','praia'],e:'A estação fica perto.',art:'🚉'},{t:'s',m:'句型',zh:'車站在學校附近。',a:'A estação fica perto da escola',w:['perto','A','da','fica','escola','estação'],e:'A estação fica perto da escola.'}]}];const E=id=>document.getElementById(id),art={chá:'🍵',café:'☕',leite:'🥛',suco:'🧃',sanduíche:'🥪',pão:'🍞',queijo:'🧀',livro:'📘',lápis:'✏️',prova:'📄',tarefa:'📝',aula:'🏫',caneta:'🖊️',estudar:'📚',dormir:'🌙',acordar:'⏰',comer:'🍽️',chegar:'🚌',morar:'🏠',ônibus:'🚌',metrô:'🚇',avião:'✈️',rua:'🛣️',estação:'🚉',cidade:'🏙️',praia:'🏖️'};let S={lesson:'food',queue:[],cur:null,pick:[],lock:false,got:0,total:8,stat:load()};function load(){try{return Object.assign({xp:0,dia:0,st:1,p:{},last:''},JSON.parse(localStorage.ptDiamondIsland||'{}'))}catch{return{xp:0,dia:0,st:1,p:{},last:''}}}function save(){localStorage.ptDiamondIsland=JSON.stringify(S.stat)}function speak(t){if(!speechSynthesis)return toast('瀏覽器不支援語音');speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='pt-BR';u.rate=.88;u.pitch=1.06;speechSynthesis.speak(u)}function toast(t){E('toast').textContent=t;E('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>E('toast').classList.remove('show'),1200)}function day(){let d=new Date;return d.toISOString().slice(0,10)}function streak(){let t=day(),y=new Date(Date.now()-864e5).toISOString().slice(0,10);if(S.stat.last!==t){S.stat.st=S.stat.last===y?S.stat.st+1:1;S.stat.last=t;save()}}function stats(){E('dia').textContent=S.stat.dia;E('xp').textContent=S.stat.xp;E('st').textContent=S.stat.st;E('date').textContent=new Intl.DateTimeFormat('zh-TW',{month:'numeric',day:'numeric'}).format(new Date)}function map(){E('lessons').innerHTML='';L.forEach(l=>{let p=S.stat.p[l.id]||0,b=document.createElement('button');b.className='lesson '+(l.id===S.lesson?'active':'');b.innerHTML='<span class=ico>'+l.ico+'</span><span><b>'+l.title+'</b><small>'+l.goal+'</small></span><span class=ring style=--v:'+p+'%>'+p+'%</span>';b.onclick=()=>{S.lesson=l.id;round(false);map()};E('lessons').append(b)})}function sh(a){return[...a].sort(()=>Math.random()-.5)}function active(){return L.find(l=>l.id===S.lesson)||L[0]}function pool(){let l=active(),a=l.cards.map(c=>({...c,lid:l.id})),r=L.filter(x=>x.id!==l.id).flatMap(x=>x.cards.slice(0,2).map(c=>({...c,lid:x.id,rev:true})));return[...sh(a),...sh(r)].slice(0,S.total)}function round(msg=true){S.got=0;S.lock=false;S.pick=[];S.queue=pool();E('done').style.display='none';E('play').style.display='block';if(msg)toast('開始今日複習');next()}function next(){S.lock=false;S.pick=[];E('fb').className='fb';if(S.got>=S.total||!S.queue.length)return finish();S.cur=S.queue.shift();render();prog();setTimeout(()=>speak(S.cur.t==='s'?S.cur.e:S.cur.a),250)}function render(){let c=S.cur;E('mode').textContent=c.rev?'間隔複習':c.m;E('dot').textContent=c.t==='s'?'文':'★';E('q').childNodes[0].nodeValue=c.t==='s'?'排出這句葡語：'+c.zh:'哪個是「'+c.zh+'」呢？';E('sub').textContent=c.t==='s'?'點字卡組句；每個字都可以朗讀。':'點卡片會播放葡語發音，再選答案。';if(c.t==='s'){E('choices').style.display='none';E('sent').style.display='grid';sentence()}else{E('sent').style.display='none';E('choices').style.display='grid';choices()}}function choices(){let c=S.cur,ops=sh([{w:c.a,a:c.art,ok:1},...c.d.map(w=>({w,a:art[w]||'🔹',ok:0}))]);E('choices').innerHTML='';ops.forEach((o,i)=>{let b=document.createElement('button');b.className='card';b.innerHTML='<span class=art>'+(o.a||art[o.w]||'🔹')+'</span><span class=ct><span>'+o.w+'</span><span class=key>'+(i+1)+'</span></span>';b.onclick=()=>{speak(o.w);answer(b,o.ok)};E('choices').append(b)})}function answer(b,ok){if(S.lock)return;S.lock=true;b.classList.add(ok?'ok':'bad');if(!ok)[...E('choices').children].forEach(x=>{if(x.textContent.includes(S.cur.a))x.classList.add('ok')});complete(!!ok)}function sentence(){E('answer').innerHTML='';E('bank').innerHTML='';S.cur.w.forEach(w=>{let b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=()=>pick(b,w);E('bank').append(b)})}function pick(b,w){if(S.lock||b.classList.contains('sel'))return;b.classList.add('sel');S.pick.push(w);let a=document.createElement('button');a.className='chip sel';a.textContent=w;a.onclick=()=>{if(S.lock)return;let i=[...E('answer').children].indexOf(a);S.pick.splice(i,1);b.classList.remove('sel');a.remove()};E('answer').append(a);speak(w);if(S.pick.length===S.cur.w.length){S.lock=true;complete(S.pick.join(' ')===S.cur.a)}}function complete(ok){if(ok){S.got++;S.stat.xp+=10;S.stat.dia+=2;let p=S.stat.p[S.cur.lid]||0;S.stat.p[S.cur.lid]=Math.min(100,p+8);E('fb').className='fb show good';E('ft').textContent='答對了';E('fp').textContent='+10 XP，+2 鑽石。例句：'+S.cur.e;speak('Muito bem!')}else{S.queue.splice(Math.min(2,S.queue.length),0,S.cur);E('fb').className='fb show oops';E('ft').textContent='再練一次';E('fp').textContent='正確答案是：'+S.cur.a+'。這題會排回本輪複習。';speak(S.cur.a)}streak();save();stats();map();prog()}function prog(){E('prog').style.setProperty('--w',Math.min(100,Math.round(S.got/S.total*100))+'%')}function finish(){E('play').style.display='none';E('done').style.display='block';E('donep').textContent='本輪拿到 '+S.got*10+' XP 和 '+S.got*2+' 顆鑽石。可以繼續刷題，或點左邊進階下一座島。';toast('今日複習完成')}E('start').onclick=()=>round();E('next').onclick=next;E('more').onclick=()=>round();E('speak').onclick=()=>speak(S.cur.t==='s'?S.cur.e:S.cur.a);E('again').onclick=()=>speak(S.cur.e||S.cur.a);E('reset').onclick=()=>{localStorage.removeItem('ptDiamondIsland');S.stat=load();stats();map();round(false);toast('紀錄已重置')};addEventListener('keydown',e=>{let n=+e.key;if(S.lock&&e.key==='Enter')next();if(!S.lock&&n>=1&&n<=3&&E('choices').style.display!=='none')E('choices').children[n-1]?.click()});streak();stats();map();round(false);</script></body></html>
